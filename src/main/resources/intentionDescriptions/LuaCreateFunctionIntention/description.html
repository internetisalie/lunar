<body>
Generates a stub for an undeclared called function. When the caret is on the callee of a call
to an undeclared name (<code>myFunc(...)</code>), inserts a
<code>local function myFunc(arg1, ..., argN) end</code> stub above the enclosing top-level
statement, with one parameter per positional argument of the call.
</body>
