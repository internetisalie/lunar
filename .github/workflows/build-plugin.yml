name: Build Plugin

# Builds the distributable plugin and runs the unit-test suite on every code push / PR.
# The env-fragile :integrationTest (launches a real GoLand via IDE-Starter, needs a license +
# display) is intentionally NOT run here — it stays on the local gce-builder. Parser/lexer
# regeneration also never runs in CI (needs local generator jars); commit src/main/gen by hand.
on:
  push:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle + IntelliJ Platform artifacts
        uses: actions/cache@v4
        with:
          # ~/.gradle holds the (large, ~1GB) downloaded GoLand platform + dependencies.
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Provision headless test environment (fonts + Lua toolchain)
        # fontconfig + a font are REQUIRED: any test that inits an editor color scheme throws
        # "Fontconfig head is null" without them. lua5.4 + lua-socket back TestLuaDebugHarness /
        # rockspec-runtime tests, which exec ~/bin/lua and open a DBGp TCP socket.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            fontconfig fonts-dejavu-core lua5.4 lua-socket
          fc-cache -f || true
          mkdir -p "$HOME/bin"
          ln -sf "$(command -v lua5.4)" "$HOME/bin/lua"
          "$HOME/bin/lua" -v

      - name: Build plugin (compile + verifyPlugin + distributable zip)
        run: ./gradlew buildPlugin --no-daemon --stacktrace

      - name: Unit tests (excludes :integrationTest and out-of-repo fixture tests)
        # `test` does not trigger :integrationTest (a separate task). -PexcludeExternalFixtureTests
        # skips the two tests that read the out-of-repo test/ fixture tree, which a CI checkout lacks.
        run: ./gradlew test --no-daemon --stacktrace -PexcludeExternalFixtureTests

      # Gitea's act_runner does NOT support the upload-artifact@v4 protocol
      # ("v4+ not supported on GHES") — v3 is the Gitea-compatible version.
      - name: Upload plugin artifact
        if: success()
        uses: actions/upload-artifact@v3
        with:
          name: lunar-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: test-reports
          path: build/reports/tests/
          if-no-files-found: ignore
