name: Build Plugin

# GitHub Actions variant of the build/test/release pipeline.
#
# This is the GitHub-native counterpart to .gitea/workflows/build-plugin.yml. GitHub only reads
# .github/workflows, and Gitea's act_runner prefers .gitea/workflows (falling back to .github only
# when .gitea is absent), so each platform runs exactly one copy — no overlap.
#
# Differences from the Gitea variant, all forced by platform incompatibilities:
#   - actions/{upload,download}-artifact@v4  (GitHub retired the v3 protocol the Gitea variant pins)
#   - release via `gh release create` against the GitHub API (the Gitea variant POSTs the Gitea API)
#   - explicit `tags: ['v*']` trigger (GitHub does not inherit act_runner's tag/path-filter behavior)
#   - the internal UniTrack ingest step is omitted (Gitea-only integration + secrets)
#
# The env-fragile :integrationTest (real GoLand via IDE-Starter) and parser/lexer regeneration are
# NOT run here — same as the Gitea variant.
on:
  push:
    branches:
      - main
    tags:
      - 'v*'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - '**/*.md'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Derive build version
        id: version
        # On a v* tag the tag IS the release version (v1.2.3 -> 1.2.3); otherwise keep the
        # gradle.properties value (…-SNAPSHOT) unchanged.
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            V="${GITHUB_REF_NAME#v}"
          else
            V="$(grep -E '^pluginVersion' gradle.properties | sed -E 's/.*= *//')"
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Building version $V"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Cache Gradle + IntelliJ Platform artifacts
        uses: actions/cache@v4
        with:
          # ~/.gradle holds the (large, ~1GB) downloaded GoLand platform + dependencies.
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', 'gradle.properties', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Provision headless test environment (fonts + Lua toolchain)
        # fontconfig + a font are REQUIRED: any test that inits an editor color scheme throws
        # "Fontconfig head is null" without them. lua5.4 + lua-socket back TestLuaDebugHarness /
        # rockspec-runtime tests, which exec ~/bin/lua and open a DBGp TCP socket.
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            fontconfig fonts-dejavu-core lua5.4 lua-socket
          fc-cache -f || true
          mkdir -p "$HOME/bin"
          ln -sf "$(command -v lua5.4)" "$HOME/bin/lua"
          "$HOME/bin/lua" -v

      - name: Build plugin (compile + verifyPlugin + distributable zip)
        run: ./gradlew buildPlugin --no-daemon --stacktrace -PpluginVersion=${{ steps.version.outputs.version }}

      - name: Unit tests (excludes :integrationTest and out-of-repo fixture tests)
        # `test` does not trigger :integrationTest (a separate task). -PexcludeExternalFixtureTests
        # skips the two tests that read the out-of-repo test/ fixture tree, which a CI checkout lacks.
        run: ./gradlew test --no-daemon --stacktrace -PpluginVersion=${{ steps.version.outputs.version }} -PexcludeExternalFixtureTests

      - name: Upload plugin artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: lunar-plugin
          path: build/distributions/*.zip
          if-no-files-found: error

      - name: Upload test reports
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: build/reports/tests/
          if-no-files-found: ignore

  # Publishes a GitHub Release on a v* tag push. `needs: build` gates it on a green build+test, and
  # it reuses the EXACT zip the build tested (download-artifact) rather than rebuilding — so the
  # released bytes are what the suite validated. Marketplace publish (publishPlugin) stays dormant.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4 # for CHANGELOG.md

      - name: Derive version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download the tested plugin artifact
        uses: actions/download-artifact@v4
        with:
          name: lunar-plugin
          path: dist

      - name: Locate the distributable zip
        id: zip
        run: |
          ZIP="$(find dist -name 'lunar-*.zip' | head -1)"
          if [ -z "$ZIP" ] || [ ! -f "$ZIP" ]; then
            echo "::error::no plugin zip found in the downloaded artifact"; ls -lR dist || true; exit 1
          fi
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "Release asset: $ZIP"

      - name: Extract release notes from CHANGELOG.md
        # Grab the body of the top-most "## [..]" section (whatever it's labelled) — tag-agnostic.
        run: |
          awk '
            /^## \[/ { if (seen) exit; seen=1; next }
            seen { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${{ steps.version.outputs.version }}" > release-notes.md
          fi
          echo "---- release notes ----"; cat release-notes.md

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" "${{ steps.zip.outputs.path }}" \
            --title "Lunar ${{ steps.version.outputs.version }}" \
            --notes-file release-notes.md
