name: Docs Front-matter Lint

# GitHub Actions variant of .gitea/workflows/docs-lint.yml. The lint scripts are platform-agnostic;
# this copy exists so the GitHub mirror runs the same doc gate. GitHub reads only .github/workflows,
# and Gitea's act_runner prefers .gitea/workflows, so each platform runs exactly one copy.
on:
  # push only on the default branch; pull_request covers every other branch — so a branch that
  # has an open PR does not run this workflow twice (once for the branch push, once for the PR).
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'scripts/lint_docs.py'
      - 'scripts/lint_planning.py'
      - '.github/workflows/docs-lint.yml'
  pull_request:
    paths:
      - 'docs/**'
      - 'scripts/lint_docs.py'
      - 'scripts/lint_planning.py'

jobs:
  lint-docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: pip install pyyaml
      - name: Lint documentation front-matter
        run: python3 scripts/lint_docs.py docs
      - name: Lint planning readiness (planned/in_progress features)
        run: python3 scripts/lint_planning.py docs
